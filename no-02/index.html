<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vesper &middot; No.02 &mdash; Pendulum Study</title>
  <meta name="description" content="Pendulum Study No.02 — an interactive field of pendulum bobs by Ikelaiah. Second in the Vesper Studies series.">
  <meta property="og:title" content="Vesper · No.02 — Pendulum Study">
  <meta property="og:description" content="An interactive pendulum-bob field. Second in the Vesper Studies series.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500;1,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gb-bg0:       #282828;
      --gb-bg1:       #3c3836;
      --gb-bg2:       #504945;
      --gb-bg3:       #665c54;
      --gb-fg:        #ebdbb2;
      --gb-fg-dim:    #d5c4a1;
      --gb-gray:      #a89984;
      --gb-yellow:    #fabd2f;
      --gb-orange:    #fe8019;
      --gb-red:       #fb4934;
      --gb-aqua:      #8ec07c;

      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: rgb(8, 8, 20);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: rgb(8, 8, 20);
      color: rgba(255, 255, 255, 0.92);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.54), rgba(0, 0, 0, 0.16) 42%, rgba(0, 0, 0, 0.04)),
        linear-gradient(180deg, rgba(0, 0, 0, 0.30), rgba(0, 0, 0, 0) 40%, rgba(0, 0, 0, 0.32));
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      cursor: crosshair;
    }

    /* Overlay canvas sits on top of the trail canvas and gets cleared every
       frame so live elements (strings, bob heads) don't accumulate into the
       trail buffer. Pointer events pass through to the trail canvas below.
       Lower z-index than masthead/story/controls so the UI stays on top. */
    #overlayCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    button {
      flex: 0 0 auto;
      min-width: 88px;
      height: 38px;
      padding: 0 15px;
      border: 1px solid var(--gb-bg3);
      border-radius: 999px;
      background: var(--gb-bg1);
      color: var(--gb-fg);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms ease;
    }

    button:hover {
      background: var(--gb-bg2);
      border-color: var(--gb-yellow);
      color: var(--gb-yellow);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
      background: var(--gb-bg3);
    }

    button:focus-visible,
    input:focus-visible {
      outline: 2px solid var(--gb-yellow);
      outline-offset: 3px;
    }

    .masthead {
      position: fixed;
      top: clamp(20px, 4vh, 44px);
      right: clamp(22px, 5vw, 64px);
      z-index: 2;
      text-align: right;
      pointer-events: none;
      font-family: "Cormorant Garamond", "EB Garamond", Georgia, serif;
      color: rgba(255, 255, 255, 0.92);
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.72);
      line-height: 1;
    }

    .masthead .masthead-rule {
      display: block;
      width: 64px;
      height: 1px;
      margin: 0 0 10px auto;
      background: rgba(255, 255, 255, 0.42);
    }

    .masthead-title {
      margin: 0;
      font-size: clamp(34px, 5vw, 68px);
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .masthead-title .word-pendulum {
      font-weight: 500;
    }

    .masthead-title .word-study {
      font-style: italic;
      font-weight: 600;
      color: #e6c46a;
      background: linear-gradient(180deg, #f3d680 0%, #c89a3a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      padding: 0 0.04em;
    }

    .masthead-sub {
      display: block;
      margin-top: 6px;
      font-size: clamp(13px, 1.3vw, 17px);
      font-weight: 500;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.72);
    }

    .masthead-sub .no {
      display: inline-block;
      letter-spacing: 0.04em;
      margin-right: 0.35em;
      text-transform: none;
      font-style: italic;
      font-weight: 600;
      font-size: 1.08em;
      letter-spacing: 0;
    }

    .masthead-sub .no .o {
      display: inline-block;
      border-bottom: 1px solid rgba(255, 255, 255, 0.78);
      padding-bottom: 1px;
      line-height: 1;
    }

    .story-panel {
      position: fixed;
      left: clamp(18px, 4vw, 56px);
      bottom: clamp(96px, 14vh, 132px);
      z-index: 2;
      width: min(520px, calc(100vw - 36px));
      pointer-events: none;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.62);
    }

    .chapter-kicker {
      margin: 0 0 8px;
      color: var(--gb-orange);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .story-panel h1 {
      margin: 0;
      color: rgba(255, 255, 255, 0.96);
      font-size: clamp(24px, 3.6vw, 42px);
      line-height: 1.05;
      font-weight: 780;
      letter-spacing: -0.005em;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .story-panel p {
      margin: 10px 0 0;
      max-width: 38ch;
      color: rgba(255, 255, 255, 0.78);
      font-size: clamp(13px, 1.2vw, 15px);
      line-height: 1.55;
      letter-spacing: 0;
      transition: opacity 520ms ease;
    }

    .story-panel p.is-fading {
      opacity: 0;
      transition: opacity 180ms ease;
    }

    .chapter-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 26px;
      pointer-events: auto;
    }

    .chapter-dots {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 96px;
      height: 38px;
      padding: 0 8px;
      border: 1px solid var(--gb-bg2);
      border-radius: 999px;
      background: rgba(40, 40, 40, 0.55);
      backdrop-filter: blur(14px);
    }

    .chapter-dot {
      min-width: 0;
      width: 10px;
      height: 10px;
      padding: 0;
      border-radius: 50%;
      border-color: var(--gb-bg3);
      background: var(--gb-gray);
    }

    .chapter-dot:hover {
      background: var(--gb-fg-dim);
      border-color: var(--gb-yellow);
    }

    .chapter-dot[aria-current="true"] {
      width: 26px;
      background: var(--gb-yellow);
      border-color: var(--gb-orange);
    }

    .controls {
      position: fixed;
      left: 50%;
      bottom: clamp(14px, 3vh, 28px);
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: min(calc(100vw - 24px), 1120px);
      padding: 10px 14px;
      border: 1px solid var(--gb-bg2);
      border-radius: 999px;
      background: rgba(40, 40, 40, 0.72);
      box-shadow: 0 16px 44px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(16px);
      transform: translateX(-50%);
      user-select: none;
    }

    .controls-secondary { display: contents; }
    .tray-toggle { display: none; }

    .slider-control {
      display: grid;
      grid-template-columns: auto minmax(80px, 130px) 46px;
      align-items: center;
      gap: 8px;
      min-width: 0;
      padding: 0 6px;
      color: var(--gb-fg-dim);
      font-size: 12px;
      font-weight: 650;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .slider-control input {
      width: 100%;
      accent-color: var(--gb-yellow);
      cursor: pointer;
    }

    .slider-control output {
      display: inline-flex;
      justify-content: flex-end;
      width: 46px;
      max-width: 46px;
      overflow: hidden;
      font-variant-numeric: tabular-nums;
      color: var(--gb-yellow);
    }

    @media (max-width: 900px) {
      body::before {
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.64), rgba(0, 0, 0, 0.10) 54%, rgba(0, 0, 0, 0.52));
      }

      .story-panel {
        left: 16px;
        right: 16px;
        bottom: 80px;
        width: auto;
      }

      .story-panel h1 { font-size: clamp(22px, 6vw, 32px); }
      .story-panel p { font-size: 13px; line-height: 1.45; }

      .masthead { top: 14px; right: 16px; }
      .masthead-title { font-size: clamp(20px, 6vw, 28px); }
      .masthead-sub { font-size: 11px; letter-spacing: 0.24em; }
      .masthead .masthead-rule { width: 44px; margin-bottom: 6px; }

      .chapter-actions { margin-top: 16px; gap: 8px; }
      .chapter-actions button {
        min-width: 70px; height: 34px; padding: 0 10px; font-size: 12px;
      }

      .chapter-dots { min-width: 82px; height: 34px; gap: 6px; }
      .chapter-dot { width: 8px; height: 8px; }
      .chapter-dot[aria-current="true"] { width: 20px; }

      .controls {
        left: 12px; right: 12px;
        width: auto; max-width: none;
        bottom: 12px;
        transform: none;
        justify-content: flex-end;
        flex-wrap: nowrap;
        border-radius: 999px;
        padding: 8px 10px;
        gap: 8px;
      }

      .tray-toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        height: 38px;
        padding: 0 14px;
      }

      .tray-toggle-icon {
        font-size: 16px;
        line-height: 1;
        transition: transform 220ms ease;
      }

      .tray-toggle[aria-expanded="true"] .tray-toggle-icon {
        transform: rotate(60deg);
        color: var(--gb-yellow);
      }

      .controls-secondary {
        display: flex;
        position: fixed;
        left: 12px; right: 12px;
        bottom: 64px;
        z-index: 3;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        padding: 14px 14px 16px;
        border: 1px solid var(--gb-bg2);
        border-radius: 20px;
        background: rgba(40, 40, 40, 0.88);
        box-shadow: 0 16px 44px rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(16px);
        transform: translateY(calc(100% + 80px));
        opacity: 0;
        pointer-events: none;
        transition: transform 280ms cubic-bezier(0.22, 1, 0.36, 1), opacity 220ms ease;
      }

      .controls-secondary.is-open {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
      }

      .controls-secondary > button { align-self: stretch; }

      .controls-secondary .slider-control {
        display: grid;
        grid-template-columns: 80px 1fr 46px;
        gap: 10px;
        width: 100%;
        padding: 4px 2px;
        font-size: 13px;
      }

      button {
        min-width: 78px;
        height: 36px;
        padding: 0 12px;
        font-size: 12px;
      }

      .controls-secondary > button { height: 40px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <canvas id="pendulumCanvas" aria-label="Interactive pendulum field"></canvas>
  <canvas id="overlayCanvas" aria-hidden="true"></canvas>

  <header class="masthead" aria-label="Exhibition title">
    <span class="masthead-rule" aria-hidden="true"></span>
    <h2 class="masthead-title"><span class="word-pendulum">Pendulum</span> <span class="word-study">Study</span></h2>
    <span class="masthead-sub"><span class="no">N<span class="o">o</span>.</span>02 &mdash; A Pendulum Field</span>
  </header>

  <section class="story-panel" aria-live="polite">
    <p class="chapter-kicker" id="chapterKicker">Introduction</p>
    <h1 id="chapterTitle">Slow Bloom</h1>
    <p id="chapterText">A field of pendulums hangs quiet. Grab a handful with the cursor, drag them aside, release. Their neighbours feel the pull through a soft coupling, and the disturbance breathes outward as gentle phase domains.</p>
    <div class="chapter-actions" aria-label="Chapter navigation">
      <button id="prevChapterBtn" type="button">Prev</button>
      <div class="chapter-dots" id="chapterDots" aria-label="Chapters"></div>
      <button id="nextChapterBtn" type="button">Next</button>
    </div>
  </section>

  <div class="controls" id="controls" aria-label="Pendulum controls">
    <button id="trayToggleBtn" class="tray-toggle" type="button" aria-expanded="false" aria-controls="controlsSecondary" aria-label="Show settings">
      <span class="tray-toggle-icon" aria-hidden="true">&#9881;</span>
      <span class="tray-toggle-label">Settings</span>
    </button>
    <div class="controls-secondary" id="controlsSecondary">
      <button id="paletteBtn" type="button" aria-label="Cycle palette">Cosmic</button>
      <button id="clearBtn" type="button">Clear</button>
      <button id="pauseBtn" type="button">Pause</button>
      <label class="slider-control">
        <span>Speed</span>
        <input id="speedInput" type="range" min="20" max="220" step="5" value="100">
        <output id="speedOutput">1.0x</output>
      </label>
      <label class="slider-control">
        <span>Damping</span>
        <input id="dampInput" type="range" min="20" max="220" step="5" value="100">
        <output id="dampOutput">1.0x</output>
      </label>
      <label class="slider-control">
        <span>Tail</span>
        <input id="tailInput" type="range" min="30" max="200" step="5" value="100">
        <output id="tailOutput">1.0x</output>
      </label>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("pendulumCanvas");
      const ctx = canvas.getContext("2d", { alpha: false });
      // Overlay canvas for live elements (strings, bob heads) that should
      // not accumulate into the trail buffer. Cleared at the start of each
      // frame. Uses alpha so the trail canvas shows through.
      const overlay = document.getElementById("overlayCanvas");
      const octx = overlay.getContext("2d", { alpha: true });
      const chapterKicker = document.getElementById("chapterKicker");
      const chapterTitle = document.getElementById("chapterTitle");
      const chapterText = document.getElementById("chapterText");
      const chapterDots = document.getElementById("chapterDots");
      const prevChapterBtn = document.getElementById("prevChapterBtn");
      const nextChapterBtn = document.getElementById("nextChapterBtn");
      const paletteBtn = document.getElementById("paletteBtn");
      const clearBtn = document.getElementById("clearBtn");
      const pauseBtn = document.getElementById("pauseBtn");
      const speedInput = document.getElementById("speedInput");
      const speedOutput = document.getElementById("speedOutput");
      const dampInput = document.getElementById("dampInput");
      const dampOutput = document.getElementById("dampOutput");
      const tailInput = document.getElementById("tailInput");
      const tailOutput = document.getElementById("tailOutput");
      const trayToggleBtn = document.getElementById("trayToggleBtn");
      const controlsSecondary = document.getElementById("controlsSecondary");

      // Shared palettes with No.01 for series cohesion
      const palettes = [
        { name: "Cosmic", hMin: 220, hRange: 130, sat: "80%", lit: "68%", bg: [8, 8, 20] },
        { name: "Ocean",  hMin: 175, hRange: 60,  sat: "88%", lit: "62%", bg: [4, 10, 22] },
        { name: "Aurora", hMin: 100, hRange: 200, sat: "80%", lit: "62%", bg: [4, 10, 14] },
        { name: "Fire",   hMin: 0,   hRange: 58,  sat: "92%", lit: "60%", bg: [18, 5, 3] },
        { name: "Forest", hMin: 85,  hRange: 75,  sat: "75%", lit: "55%", bg: [4, 12, 6] }
      ];

      // A field of independent pendulum bobs. Each chapter tunes the field's
      // shape (grid layout), physics (gravity, damping, length distribution),
      // and visual palette. Bobs swing under gravity; LMB-hold pulls them
      // toward the cursor; release fires a radial impulse on their angular
      // velocity that scatters the field, after which gravity reels them home.
      // Each chapter tunes the field's shape (grid layout), physics (gravity,
      // damping, length distribution, neighbour coupling), and visual palette.
      // `coupling` is the Kuramoto-style sin-difference torque between grid
      // neighbours — higher values mean disturbances ripple outward and the
      // field tends to form synchronised phase domains. Pendulum Wave keeps
      // coupling at zero so the length progression is allowed to express
      // itself as the classroom-demo travelling wave.
      const chapters = [
        {
          kicker: "Introduction",
          title: "Slow Bloom",
          text: "A field of pendulums hangs quiet. Grab a handful with the cursor, drag them aside, release. Their neighbours feel the pull through a soft coupling, and the disturbance breathes outward as gentle phase domains.",
          palette: "Cosmic",
          fade: 0.036,
          cols: 16, rows: 9,
          jitter: 0.18,
          lenMin: 0.08, lenMax: 0.14,
          gravity: 1.7,
          damp: 0.0035,
          tiltX: 0,
          coupling: 0.9,
          seed: 1,
          mode: "uniform"
        },
        {
          kicker: "Chapter 1",
          title: "Lacework",
          text: "Short strings, tighter spacing, stronger coupling. Pluck one bob and a ripple races outward through the lace; the field weaves itself into travelling phase fronts before settling.",
          palette: "Ocean",
          fade: 0.044,
          cols: 22, rows: 12,
          jitter: 0.12,
          lenMin: 0.04, lenMax: 0.07,
          gravity: 2.8,
          damp: 0.0045,
          tiltX: 0,
          coupling: 1.6,
          seed: 2,
          mode: "uniform"
        },
        {
          kicker: "Chapter 2",
          title: "Drift",
          text: "Gravity leans. Coupling is faint, so each bob carves its own slow oval that walks sideways across the page — domains form briefly and dissolve again.",
          palette: "Aurora",
          fade: 0.036,
          cols: 18, rows: 10,
          jitter: 0.22,
          lenMin: 0.06, lenMax: 0.11,
          gravity: 2.2,
          damp: 0.0025,
          tiltX: 0.45,
          coupling: 0.35,
          seed: 3,
          mode: "uniform"
        },
        {
          kicker: "Chapter 3",
          title: "Pendulum Wave",
          text: "Strings tuned in an arithmetic progression and coupling held to zero. The lengths alone do the work — the field aligns, scatters into a travelling wave, gathers, scatters again.",
          palette: "Fire",
          fade: 0.040,
          cols: 24, rows: 14,
          jitter: 0.02,
          lenMin: 0.05, lenMax: 0.10,
          gravity: 3.0,
          damp: 0.0010,
          tiltX: 0,
          coupling: 0.0,
          seed: 4,
          mode: "wave"
        },
        {
          kicker: "Ending",
          title: "Settling",
          text: "Damping rises and coupling climbs with it. As the field loses energy the bobs lock into synchrony, swinging together more and more quietly until the page is still.",
          palette: "Forest",
          fade: 0.056,
          cols: 16, rows: 9,
          jitter: 0.20,
          lenMin: 0.07, lenMax: 0.13,
          gravity: 2.0,
          damp: 0.018,
          tiltX: 0,
          coupling: 2.2,
          seed: 5,
          mode: "uniform"
        }
      ];

      let currentChapterIndex = 0;
      let paletteIndex = getPaletteIndex(chapters[0].palette);
      let hueShift = 0;
      let frame = 0;
      let internalT = 0;
      let lastFrameTime = 0;
      let animationId = 0;
      let paused = false;
      let dpr = 1;

      let speedMultiplier = 1.0;
      let dampMultiplier = 1.0;
      let tailMultiplier = 1.0;

      // Bob field. Each bob is an independent simple pendulum:
      //   theta'' = -(g/L) * sin(theta) - damp * theta'
      // Rendered position is (pivot + L * (sin theta, cos theta)).
      const bobs = [];

      // Seeded RNG so chapter layouts are stable across re-init.
      function mulberry32(seed) {
        let s = seed >>> 0;
        return function () {
          s = (s + 0x6D2B79F5) >>> 0;
          let t = s;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      // Pointer state. `prevX/prevY` are the cursor position on the previous
      // frame so we can compute the cursor's instantaneous velocity for
      // pluck-release flicks.
      const pointer = {
        active: false,
        x: 0,
        y: 0,
        prevX: 0,
        prevY: 0,
        vx: 0,  // px/sec, smoothed
        vy: 0,
        pressedAt: 0
      };

      // Indices of bobs currently held by the cursor. Held bobs ignore
      // pendulum physics — their angle is driven directly by the cursor
      // offset. Released bobs receive the cursor's tangential velocity as
      // angular impulse and re-enter physics.
      const held = [];
      const GRAB_RADIUS_PX = 110;   // how far around the cursor we grab
      const MAX_GRABBED = 14;       // cap so a click in a dense region doesn't seize the whole field
      const MAX_PLUCK_ANGLE = 1.25; // ~72° — how far we'll let the cursor stretch a bob from rest

      // Released-bob flash: a brief bright pulse on each bob the moment its
      // grip releases, so you can see what you flicked.
      const flashUntil = new Map();  // bob index -> performance.now() ms
      const FLASH_DURATION_MS = 380;

      function currentChapter() { return chapters[currentChapterIndex]; }
      function currentPalette() { return palettes[paletteIndex]; }

      function getPaletteIndex(name) {
        const i = palettes.findIndex((p) => p.name === name);
        return i >= 0 ? i : 0;
      }

      function bgCss(alpha = 1) {
        const [r, g, b] = currentPalette().bg;
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }

      function syncPageBackground() {
        const [r, g, b] = currentPalette().bg;
        const color = `rgb(${r}, ${g}, ${b})`;
        document.documentElement.style.background = color;
        document.body.style.background = color;
      }

      function resizeCanvas() {
        const nextDpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2.5));
        const width = Math.max(1, Math.floor(canvas.clientWidth * nextDpr));
        const height = Math.max(1, Math.floor(canvas.clientHeight * nextDpr));

        if (canvas.width === width && canvas.height === height && dpr === nextDpr) return;

        dpr = nextDpr;
        canvas.width = width;
        canvas.height = height;
        overlay.width = width;
        overlay.height = height;
        fillBackground();
        // Re-layout because pivot positions depend on canvas size.
        initBobs();
      }

      function fillBackground() {
        syncPageBackground();
        ctx.save();
        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = bgCss(1);
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }

      function loadChapter() {
        internalT = 0;
        held.length = 0;
        flashUntil.clear();
        initBobs();
      }

      function initBobs() {
        bobs.length = 0;
        const ch = currentChapter();
        const w = canvas.width;
        const h = canvas.height;
        if (w === 0 || h === 0) return;

        const rng = mulberry32(ch.seed * 1000 + ch.cols * 31 + ch.rows);
        const cols = ch.cols;
        const rows = ch.rows;
        const diag = Math.hypot(w, h);
        const cellW = w / (cols + 1);
        const cellH = h / (rows + 1);
        const jitterX = cellW * ch.jitter;
        const jitterY = cellH * ch.jitter;

        const total = cols * rows;
        let i = 0;
        for (let r = 0; r < rows; r += 1) {
          for (let c = 0; c < cols; c += 1) {
            const px = cellW * (c + 1) + (rng() - 0.5) * jitterX * 2;
            const py = cellH * (r + 1) + (rng() - 0.5) * jitterY * 2;

            // Length distribution: chapter "mode" picks the rule.
            let lenFrac;
            if (ch.mode === "wave") {
              // Pendulum-wave: lengths in a smooth arithmetic progression
              // across the index, so the field re-coheres periodically.
              lenFrac = ch.lenMin + (ch.lenMax - ch.lenMin) * (i / Math.max(1, total - 1));
            } else {
              lenFrac = ch.lenMin + rng() * (ch.lenMax - ch.lenMin);
            }
            const L = diag * lenFrac;

            // Initial angle: small random push so the field doesn't start
            // perfectly still.
            const theta0 = (rng() - 0.5) * 0.6;
            const omega0 = (rng() - 0.5) * 0.4;

            // lenT: 0 = shortest in this chapter, 1 = longest. Used to
            // colour the bob — short bobs sit at one end of the palette's
            // hue range, long bobs at the other — so the field visibly
            // stratifies by length. In "wave" mode this turns the
            // pendulum-wave into a moving colour gradient. A small random
            // jitter keeps neighbours from being identical.
            const lenT = (lenFrac - ch.lenMin) / Math.max(0.0001, ch.lenMax - ch.lenMin);
            const palette = palettes[getPaletteIndex(ch.palette)];
            const lenHueOff = lenT * palette.hRange * 0.85 + (rng() - 0.5) * palette.hRange * 0.08;

            bobs.push({
              px, py, L, lenT,
              theta: theta0,
              omega: omega0,
              hueOff: lenHueOff,
              lx: null,
              ly: null,
              gc: c, gr: r,        // grid column/row, for neighbour lookup
              neighbours: null     // filled in below — indices of up/down/left/right bobs
            });
            i += 1;
          }
        }

        // Wire up 4-neighbour links on the chapter grid. Each bob has at most
        // four neighbours (up/down/left/right) — these are the partners
        // it phase-couples with each frame. We build it once here so the
        // hot loop is just an indexed lookup.
        for (const b of bobs) {
          const list = [];
          const idxOf = (c, r) => r * cols + c;
          if (b.gc > 0)        list.push(idxOf(b.gc - 1, b.gr));
          if (b.gc < cols - 1) list.push(idxOf(b.gc + 1, b.gr));
          if (b.gr > 0)        list.push(idxOf(b.gc, b.gr - 1));
          if (b.gr < rows - 1) list.push(idxOf(b.gc, b.gr + 1));
          b.neighbours = list;
        }
      }

      function drawSegment(x0, y0, x1, y1, t, hueOff) {
        const palette = currentPalette();
        const dx = x1 - x0;
        const dy = y1 - y0;
        const segLen = Math.sqrt(dx * dx + dy * dy);
        // Skip absurd jumps (chapter swap, re-layout)
        if (segLen > Math.min(canvas.width, canvas.height) * 0.4) return;

        // Hue cycles with internal time so colour breathes along the trails.
        const hue = (palette.hMin + (t * 18 + hueShift + hueOff) % palette.hRange + 360) % 360;
        const alpha = 0.72;

        ctx.strokeStyle = `hsla(${hue}, ${palette.sat}, ${palette.lit}, ${alpha})`;
        ctx.lineWidth = 1.1 * dpr;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(x0, y0);
        ctx.lineTo(x1, y1);
        ctx.stroke();
      }

      function drawPointerGlow() {
        if (!pointer.active && held.length === 0) return;

        const palette = currentPalette();
        const radius = 90 * dpr;
        const hue = (palette.hMin + hueShift) % 360;
        const glow = octx.createRadialGradient(pointer.x, pointer.y, 0, pointer.x, pointer.y, radius);

        glow.addColorStop(0, `hsla(${hue}, ${palette.sat}, ${palette.lit}, 0.16)`);
        glow.addColorStop(0.6, `hsla(${hue}, ${palette.sat}, ${palette.lit}, 0.05)`);
        glow.addColorStop(1, `hsla(${hue}, ${palette.sat}, ${palette.lit}, 0)`);

        octx.save();
        octx.globalCompositeOperation = "lighter";
        octx.fillStyle = glow;
        octx.beginPath();
        octx.arc(pointer.x, pointer.y, radius, 0, Math.PI * 2);
        octx.fill();
        octx.restore();
      }

      // Filaments from the cursor to each currently-held bob. Drawn on top
      // of strings/bobs so the pluck gesture reads as direct manipulation
      // ("you are pulling these specific bobs aside").
      function drawHeldFilaments() {
        if (held.length === 0) return;
        const palette = currentPalette();
        const hue = (palette.hMin + hueShift) % 360;
        octx.save();
        octx.globalCompositeOperation = "lighter";
        octx.strokeStyle = `hsla(${hue}, ${palette.sat}, 80%, 0.55)`;
        octx.lineWidth = 0.9 * dpr;
        octx.lineCap = "round";
        octx.beginPath();
        for (const idx of held) {
          const b = bobs[idx];
          if (!b || b.lx === null) continue;
          octx.moveTo(pointer.x, pointer.y);
          octx.lineTo(b.lx, b.ly);
        }
        octx.stroke();
        octx.restore();
      }

      function drawFrame(now) {
        if (!lastFrameTime) lastFrameTime = now;
        const dtMs = Math.min(48, now - lastFrameTime);
        lastFrameTime = now;

        const ch = currentChapter();
        const dtSec = (dtMs / 1000) * speedMultiplier;
        internalT += dtSec;

        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = bgCss(ch.fade / tailMultiplier);
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.globalCompositeOperation = "lighter";

        const gBase = ch.gravity * 32.0;
        const damp = ch.damp * dampMultiplier;
        const tilt = ch.tiltX;
        const coupling = ch.coupling || 0;

        const SUBSTEPS = 2;
        const h = dtSec / SUBSTEPS;

        // Held bobs: drive theta directly from the cursor offset relative
        // to the pivot. This is direct manipulation — the bob hangs from
        // the cursor position (clamped to a maximum stretch angle), rather
        // than being tugged via a soft torque. omega is set from the
        // change in theta so when the bob is released it carries the
        // cursor's instantaneous velocity into its swing.
        if (held.length > 0) {
          for (const idx of held) {
            const b = bobs[idx];
            if (!b) continue;
            const dx = pointer.x - b.px;
            const dy = pointer.y - b.py;
            // Target angle: where the bob would hang if its string were
            // pinned to the cursor. atan2(dx, dy) because theta=0 means
            // straight down (+y), and increasing theta swings +x.
            let target = Math.atan2(dx, Math.max(0.001, dy));
            if (target > MAX_PLUCK_ANGLE)  target = MAX_PLUCK_ANGLE;
            if (target < -MAX_PLUCK_ANGLE) target = -MAX_PLUCK_ANGLE;
            const prevTheta = b.theta;
            b.theta = target;
            // omega = d(theta)/dt — gives a flick-release the right energy.
            if (dtSec > 0.0001) b.omega = (target - prevTheta) / dtSec;
          }
        }

        // Free bobs: integrate normal pendulum physics plus neighbour
        // phase coupling. Held bobs are skipped — they are driven above.
        const heldSet = held.length > 0 ? new Set(held) : null;

        for (let i = 0; i < bobs.length; i += 1) {
          const b = bobs[i];
          if (heldSet && heldSet.has(i)) {
            // Still need to update the render position from the driven theta.
            const sinT = Math.sin(b.theta);
            const cosT = Math.cos(b.theta);
            const rx = b.px + b.L * sinT;
            const ry = b.py + b.L * cosT;
            if (b.lx !== null) drawSegment(b.lx, b.ly, rx, ry, internalT, b.hueOff);
            b.lx = rx; b.ly = ry;
            continue;
          }

          // Integrate angular motion. Semi-implicit Euler:
          //   omega += a * dt;  theta += omega * dt
          // where a = -(g / L) * sin(theta) - damp * omega + tilt * cos(theta)
          //          + K * sum over grid-neighbours of sin(theta_j - theta_i)
          //
          // The coupling term is Kuramoto-style — it pulls each bob's phase
          // toward its grid-neighbour phases. Disturbances propagate as
          // ripples; idle regions form synchronised domains.
          //
          // Plus an over-spin brake: if |omega| exceeds the natural-swing
          // ceiling, extra cubic damping kicks in so a flicked release
          // can't push the bob into permanent rotation.
          const invL = 1 / b.L;
          const omegaNatural = Math.sqrt(gBase * invL);
          const omegaCap = omegaNatural * 2.8;

          // Precompute coupling torque — same for both substeps (theta_j
          // changes slowly relative to h, and recomputing per-substep is
          // expensive). Strength scales with the natural frequency so
          // light bobs and heavy bobs feel coupling at the same "rate".
          let couple = 0;
          if (coupling > 0 && b.neighbours) {
            const k = coupling * omegaNatural * 0.6;
            for (const nIdx of b.neighbours) {
              const nb = bobs[nIdx];
              if (!nb) continue;
              couple += k * Math.sin(nb.theta - b.theta);
            }
          }

          for (let s = 0; s < SUBSTEPS; s += 1) {
            const sinT = Math.sin(b.theta);
            const cosT = Math.cos(b.theta);
            let alpha = -gBase * invL * sinT - damp * b.omega + couple;
            if (tilt) alpha += tilt * cosT * invL * gBase * 0.4;

            const absOmega = Math.abs(b.omega);
            if (absOmega > omegaCap) {
              const excess = (absOmega - omegaCap) / omegaNatural;
              const brake = 3.5 * excess * excess * omegaNatural;
              alpha -= Math.sign(b.omega) * brake;
            }

            b.omega += alpha * h;
            b.theta += b.omega * h;
          }

          const sinT2 = Math.sin(b.theta);
          const cosT2 = Math.cos(b.theta);
          const rx = b.px + b.L * sinT2;
          const ry = b.py + b.L * cosT2;

          if (b.lx !== null) {
            drawSegment(b.lx, b.ly, rx, ry, internalT, b.hueOff);
          }
          b.lx = rx;
          b.ly = ry;
        }

        // Live overlay pass: clear the overlay and redraw the strings and
        // bob heads from scratch. Because we redraw fresh each frame they
        // do not accumulate into a trail/triangle fill the way the trail
        // canvas does. Strings are also clipped to the bottom portion of
        // each pendulum and suppressed when the bob is near rest, so the
        // field reads as "things hanging" rather than "harsh radial lines
        // from every grid point".
        octx.clearRect(0, 0, overlay.width, overlay.height);
        const palette = currentPalette();

        // Strings: only the lower portion (from a fraction of the way down
        // the string to the bob). Alpha rises with |theta| so resting bobs
        // are nearly invisible and swinging bobs are clearly present.
        octx.lineWidth = 0.6 * dpr;
        octx.lineCap = "round";
        octx.strokeStyle = `hsla(${palette.hMin}, ${palette.sat}, 72%, 0.55)`;
        octx.beginPath();
        const STRING_START = 0.40; // draw from 40% down the string to the bob
        for (const b of bobs) {
          if (b.lx === null) continue;
          // Alpha proxy: skip if the bob is nearly straight down. Below this
          // threshold the string contributes only noise.
          if (Math.abs(b.theta) < 0.08) continue;
          const sx = b.px + (b.lx - b.px) * STRING_START;
          const sy = b.py + (b.ly - b.py) * STRING_START;
          octx.moveTo(sx, sy);
          octx.lineTo(b.lx, b.ly);
        }
        octx.stroke();

        // Bright bob heads on top of the strings. Held bobs (and bobs
        // recently released) get a brighter, slightly larger head so the
        // gesture reads clearly. The release flash decays linearly.
        const nowMs = performance.now();
        const heldSetDraw = held.length > 0 ? new Set(held) : null;
        for (let i = 0; i < bobs.length; i += 1) {
          const b = bobs[i];
          if (b.lx === null) continue;
          const hue = (palette.hMin + (internalT * 18 + hueShift + b.hueOff) % palette.hRange + 360) % 360;
          let radius = 1.6 * dpr;
          let lit = 76;
          let alpha = 0.95;
          if (heldSetDraw && heldSetDraw.has(i)) {
            radius = 2.6 * dpr;
            lit = 88;
          } else {
            const flashAt = flashUntil.get(i);
            if (flashAt) {
              const remain = (flashAt - nowMs) / FLASH_DURATION_MS;
              if (remain > 0) {
                radius = (1.6 + 1.6 * remain) * dpr;
                lit = 76 + 14 * remain;
                alpha = 0.95;
              } else {
                flashUntil.delete(i);
              }
            }
          }
          octx.fillStyle = `hsla(${hue}, ${palette.sat}, ${lit}%, ${alpha})`;
          octx.beginPath();
          octx.arc(b.lx, b.ly, radius, 0, Math.PI * 2);
          octx.fill();
        }

        drawHeldFilaments();
        drawPointerGlow();

        hueShift = (hueShift + 0.08) % 360;
        frame += 1;
        animationId = requestAnimationFrame(drawFrame);
      }

      function startAnimation() {
        if (!animationId) {
          lastFrameTime = 0;
          animationId = requestAnimationFrame(drawFrame);
        }
      }

      function stopAnimation() {
        if (animationId) {
          cancelAnimationFrame(animationId);
          animationId = 0;
        }
      }

      function setPaused(next) {
        paused = next;
        pauseBtn.textContent = paused ? "Resume" : "Pause";
        if (paused) stopAnimation(); else startAnimation();
      }

      function updateControlLabels() {
        paletteBtn.textContent = currentPalette().name;
        speedInput.value = String(Math.round(speedMultiplier * 100));
        speedOutput.textContent = `${speedMultiplier.toFixed(1)}x`;
        dampInput.value = String(Math.round(dampMultiplier * 100));
        dampOutput.textContent = `${dampMultiplier.toFixed(1)}x`;
        tailInput.value = String(Math.round(tailMultiplier * 100));
        tailOutput.textContent = `${tailMultiplier.toFixed(1)}x`;
      }

      const SCRAMBLE_CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ#%&*+=/\\<>?:;~";
      const scrambleTokens = new WeakMap();

      function scrambleTo(el, finalText, durationMs = 700) {
        const token = (scrambleTokens.get(el) || 0) + 1;
        scrambleTokens.set(el, token);
        const start = performance.now();
        const startText = el.textContent || "";
        const maxLen = Math.max(startText.length, finalText.length);

        function f(now) {
          if (scrambleTokens.get(el) !== token) return;
          const progress = Math.min(1, (now - start) / durationMs);
          let out = "";
          for (let i = 0; i < finalText.length; i += 1) {
            const target = finalText[i];
            const revealAt = (i / maxLen) * 0.7;
            if (progress >= revealAt + 0.18 || target === " ") {
              out += target;
            } else if (progress >= revealAt) {
              const tt = (progress - revealAt) / 0.18;
              out += Math.random() < tt ? target : SCRAMBLE_CHARS[Math.floor(Math.random() * SCRAMBLE_CHARS.length)];
            } else {
              out += SCRAMBLE_CHARS[Math.floor(Math.random() * SCRAMBLE_CHARS.length)];
            }
          }
          el.textContent = out;
          if (progress < 1) requestAnimationFrame(f);
          else el.textContent = finalText;
        }

        requestAnimationFrame(f);
      }

      let isFirstStoryRender = true;

      function updateStory() {
        const chapter = currentChapter();

        if (isFirstStoryRender) {
          chapterKicker.textContent = chapter.kicker;
          chapterTitle.textContent = chapter.title;
          chapterText.textContent = chapter.text;
          isFirstStoryRender = false;
        } else {
          scrambleTo(chapterKicker, chapter.kicker, 520);
          scrambleTo(chapterTitle, chapter.title, 760);
          chapterText.classList.add("is-fading");
          window.setTimeout(() => {
            chapterText.textContent = chapter.text;
            chapterText.classList.remove("is-fading");
          }, 200);
        }

        const dots = chapterDots.querySelectorAll(".chapter-dot");
        dots.forEach((dot, index) => {
          const active = index === currentChapterIndex;
          dot.setAttribute("aria-current", active ? "true" : "false");
          dot.setAttribute("aria-label", `${active ? "Current chapter" : "Go to chapter"}: ${chapters[index].kicker}`);
        });
      }

      function setChapter(index) {
        currentChapterIndex = (index + chapters.length) % chapters.length;
        const chapter = currentChapter();
        paletteIndex = getPaletteIndex(chapter.palette);
        hueShift = 0;
        loadChapter();
        updateControlLabels();
        updateStory();
        fillBackground();

        if (controlsSecondary.classList.contains("is-open")) {
          controlsSecondary.classList.remove("is-open");
          trayToggleBtn.setAttribute("aria-expanded", "false");
          trayToggleBtn.setAttribute("aria-label", "Show settings");
        }
      }

      function clearAndReset() {
        fillBackground();
        loadChapter();
      }

      function buildChapterDots() {
        chapterDots.innerHTML = "";
        chapters.forEach((chapter, index) => {
          const dot = document.createElement("button");
          dot.type = "button";
          dot.className = "chapter-dot";
          dot.addEventListener("click", () => setChapter(index));
          chapterDots.appendChild(dot);
        });
      }

      prevChapterBtn.addEventListener("click", () => setChapter(currentChapterIndex - 1));
      nextChapterBtn.addEventListener("click", () => setChapter(currentChapterIndex + 1));

      paletteBtn.addEventListener("click", () => {
        paletteIndex = (paletteIndex + 1) % palettes.length;
        hueShift = 0;
        updateControlLabels();
        fillBackground();
        for (const b of bobs) { b.lx = null; b.ly = null; }
      });

      clearBtn.addEventListener("click", clearAndReset);
      pauseBtn.addEventListener("click", () => setPaused(!paused));

      speedInput.addEventListener("input", () => {
        speedMultiplier = Number(speedInput.value) / 100;
        speedOutput.textContent = `${speedMultiplier.toFixed(1)}x`;
      });

      dampInput.addEventListener("input", () => {
        dampMultiplier = Number(dampInput.value) / 100;
        dampOutput.textContent = `${dampMultiplier.toFixed(1)}x`;
      });

      tailInput.addEventListener("input", () => {
        tailMultiplier = Number(tailInput.value) / 100;
        tailOutput.textContent = `${tailMultiplier.toFixed(1)}x`;
      });

      trayToggleBtn.addEventListener("click", () => {
        const isOpen = controlsSecondary.classList.toggle("is-open");
        trayToggleBtn.setAttribute("aria-expanded", isOpen ? "true" : "false");
        trayToggleBtn.setAttribute("aria-label", isOpen ? "Hide settings" : "Show settings");
      });

      function updatePointerFromEvent(event) {
        const rect = canvas.getBoundingClientRect();
        const nx = (event.clientX - rect.left) * (canvas.width / rect.width);
        const ny = (event.clientY - rect.top) * (canvas.height / rect.height);
        // Smooth cursor velocity (exponential moving average) so a flick
        // release reads as a flick and a slow release reads as gentle.
        const now = performance.now();
        const dt = Math.max(0.001, (now - (pointer._lastT || now)) / 1000);
        const ivx = (nx - pointer.x) / dt;
        const ivy = (ny - pointer.y) / dt;
        const a = 0.35;
        pointer.vx = pointer.vx * (1 - a) + ivx * a;
        pointer.vy = pointer.vy * (1 - a) + ivy * a;
        pointer._lastT = now;
        pointer.prevX = pointer.x;
        pointer.prevY = pointer.y;
        pointer.x = nx;
        pointer.y = ny;
      }

      // Grab the closest bobs to the cursor. We rank by the distance from
      // the cursor to each bob's *current* rendered position (b.lx, b.ly),
      // not the pivot — so what you grab is what you see. Capped at
      // MAX_GRABBED so a click in a dense region doesn't seize the whole
      // field.
      function grabNearbyBobs() {
        held.length = 0;
        const radius = GRAB_RADIUS_PX * dpr;
        const radiusSq = radius * radius;
        const candidates = [];
        for (let i = 0; i < bobs.length; i += 1) {
          const b = bobs[i];
          if (b.lx === null) continue;
          const dx = b.lx - pointer.x;
          const dy = b.ly - pointer.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < radiusSq) candidates.push({ i, d2 });
        }
        candidates.sort((a, b) => a.d2 - b.d2);
        const limit = Math.min(MAX_GRABBED, candidates.length);
        for (let k = 0; k < limit; k += 1) held.push(candidates[k].i);
      }

      // Release all held bobs. Each bob's angular velocity has already been
      // set during the drive step (from d(theta)/dt), so we just flash them
      // and let physics take over.
      function releaseHeld() {
        if (held.length === 0) return;
        const nowMs = performance.now();
        const ch = currentChapter();
        const gBase = ch.gravity * 32.0;
        for (const idx of held) {
          const b = bobs[idx];
          if (!b) continue;
          // Cap omega to the over-spin threshold so a violent flick still
          // produces a memorable swing but not permanent rotation.
          const omegaNatural = Math.sqrt(gBase / b.L);
          const cap = 2.4 * omegaNatural;
          if (b.omega > cap)  b.omega = cap;
          if (b.omega < -cap) b.omega = -cap;
          flashUntil.set(idx, nowMs + FLASH_DURATION_MS);
        }
        held.length = 0;
      }

      canvas.addEventListener("mousedown", (event) => {
        pointer.active = true;
        pointer.pressedAt = performance.now();
        updatePointerFromEvent(event);
        grabNearbyBobs();
      });

      canvas.addEventListener("mousemove", (event) => {
        if (pointer.active) updatePointerFromEvent(event);
      });

      window.addEventListener("mouseup", () => {
        releaseHeld();
        pointer.active = false;
        pointer.pressedAt = 0;
      });

      canvas.addEventListener("mouseleave", () => {
        releaseHeld();
        pointer.active = false;
        pointer.pressedAt = 0;
      });

      canvas.addEventListener("touchstart", (event) => {
        pointer.active = true;
        pointer.pressedAt = performance.now();
        updatePointerFromEvent(event.touches[0]);
        grabNearbyBobs();
        event.preventDefault();
      }, { passive: false });

      canvas.addEventListener("touchmove", (event) => {
        if (pointer.active && event.touches.length > 0) {
          updatePointerFromEvent(event.touches[0]);
        }
        event.preventDefault();
      }, { passive: false });

      window.addEventListener("touchend", () => {
        releaseHeld();
        pointer.active = false;
        pointer.pressedAt = 0;
      });

      window.addEventListener("resize", resizeCanvas);

      window.addEventListener("keydown", (event) => {
        const tag = document.activeElement ? document.activeElement.tagName : "";
        if (tag === "INPUT" || tag === "BUTTON") return;

        if (event.key === "ArrowRight") setChapter(currentChapterIndex + 1);
        else if (event.key === "ArrowLeft") setChapter(currentChapterIndex - 1);
        else if (event.key === " ") {
          setPaused(!paused);
          event.preventDefault();
        }
      });

      buildChapterDots();
      updateControlLabels();
      updateStory();
      resizeCanvas();
      fillBackground();
      loadChapter();
      startAnimation();
    })();
  </script>
</body>
</html>
